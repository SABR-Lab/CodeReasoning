name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Display Python version
      run: python -c "import sys; print(f'Python {sys.version}')"
    
    - name: Verify Python
      run: |
        echo "Python: $(python --version)"
        
    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        
    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short
    
    - name: Run validation tests
      run: |
        python -m pytest tests/test_validation.py -v
    
    - name: Run integration tests
      run: |
        python -m pytest tests/test_integration.py -v
      
    - name: Check code style (optional)
      run: |
        python -m py_compile core/*.py parallel/*.py utils/*.py 2>/dev/null || true

  quick-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install pytest
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Run quick tests (no Defects4J)
      run: |
        python -m pytest tests/test_mutation_parser.py -q
    
    - name: Check for syntax errors
      run: |
        python -m py_compile main.py config/*.py 2>&1 | head -20
